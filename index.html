<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>기업 공시 보드 — 수주·실적·시설투자</title>
<style>
  :root{ --bg:#0f172a; --card:#1e293b; --line:#334155; --txt:#e2e8f0; --sub:#94a3b8; --up:#f43f5e; --dn:#3b82f6; --accent:#38bdf8; --chip:#0ea5e9; }
  @media (prefers-color-scheme: light){ :root{ --bg:#f8fafc; --card:#fff; --line:#e2e8f0; --txt:#0f172a; --sub:#64748b; --up:#e11d48; --dn:#2563eb; --accent:#0284c7; --chip:#0284c7;} }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--txt);}
  header{padding:20px 16px 6px;max-width:1100px;margin:0 auto;}
  h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.5px}
  .meta{color:var(--sub);font-size:13px;margin-top:4px}
  .tabs{max-width:1100px;margin:12px auto 0;padding:0 16px;display:flex;gap:8px}
  .tab{background:var(--card);border:1px solid var(--line);color:var(--sub);border-radius:999px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer}
  .tab.on{background:var(--accent);color:#04222f;border-color:var(--accent)}
  .bar{max-width:1100px;margin:10px auto 0;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  input,select{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 12px;font-size:14px;outline:none}
  input{flex:1;min-width:160px}
  .wrap{max-width:1100px;margin:14px auto 40px;padding:0 16px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:11px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;background:var(--bg)}
  th:hover{color:var(--accent)}
  tr:hover td{background:rgba(148,163,184,.06)}
  .corp{font-weight:700}
  .code{color:var(--sub);font-size:12px;margin-left:4px}
  .corr{margin-left:5px;font-size:11px;font-weight:700;color:#f59e0b;border:1px solid #f59e0b55;border-radius:5px;padding:1px 4px}
  .amt{font-weight:800;color:var(--accent);white-space:nowrap;text-align:right}
  .num{text-align:right;white-space:nowrap}
  .content{max-width:320px}
  .sub{color:var(--sub)}
  .date{color:var(--sub);white-space:nowrap;font-size:13px}
  a.dart{color:var(--chip);text-decoration:none;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:2px 6px}
  a.dart:hover{border-color:var(--chip)}
  .empty{text-align:center;color:var(--sub);padding:40px}
  .up{color:var(--up);font-weight:700}.dn{color:var(--dn);font-weight:700}
  footer{max-width:1100px;margin:0 auto 30px;padding:0 16px;color:var(--sub);font-size:12px;line-height:1.6}
  @media(max-width:640px){ .content{max-width:150px} .hide-m{display:none} h1{font-size:18px} }
</style>
</head>
<body>
<header>
  <h1>📊 기업 공시 보드</h1>
  <div class="meta" id="meta">불러오는 중…</div>
</header>
<div class="tabs" id="tabs">
  <button class="tab on" data-t="contracts">수주·공급계약</button>
  <button class="tab" data-t="earnings">실적</button>
  <button class="tab" data-t="investments">신규시설투자</button>
</div>
<div class="bar">
  <select id="day"></select>
  <input id="q" placeholder="종목·내용 검색 (전체 날짜)">
  <select id="sort"></select>
</div>
<div class="wrap"><table><thead id="th"></thead><tbody id="tb"></tbody></table></div>
<div class="wrap" id="ad-slot" style="min-height:0"></div>
<footer>
  데이터 출처: 금융감독원 DART 전자공시(공개정보). 투자 참고용이며 정확성을 보장하지 않습니다.<br>
  매출대비 = 계약/투자금액 ÷ 최근 매출액. 실적은 연결(연결재무제표) 우선 표시. 정정·취소가 반영되지 않을 수 있습니다.
</footer>
<script>
/* ── 광고 설정 ── 애드센스 승인 후 아래 2개만 채우면 자동으로 광고가 뜹니다.
   ADSENSE_PUB : 애드센스 게시자 ID (예: 'ca-pub-1234567890123456')
   ADSENSE_SLOT: 광고 단위 슬롯 ID (예: '1234567890')  */
const ADSENSE_PUB = '';
const ADSENSE_SLOT = '';
if (ADSENSE_PUB) {
  const s=document.createElement('script'); s.async=true; s.crossOrigin='anonymous';
  s.src='https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client='+ADSENSE_PUB;
  document.head.appendChild(s);
  document.getElementById('ad-slot').innerHTML=
    `<ins class="adsbygoogle" style="display:block" data-ad-client="${ADSENSE_PUB}" data-ad-slot="${ADSENSE_SLOT}" data-ad-format="auto" data-full-width-responsive="true"></ins>`;
  (window.adsbygoogle=window.adsbygoogle||[]).push({});
}

const CFG = {
  contracts: {
    label:'수주·공급계약',
    cols:[['공시일','pub_date'],['종목','corp_name'],['계약내용','content'],['금액','amount','num'],['매출대비','ratio','num'],['계약상대','party','hide-m'],['기간','period','hide-m date'],['','']],
    sorts:[['pub_date','최신순'],['amount','금액순'],['ratio','매출대비순']],
    row:d=>`<td class="date">${d.pub_date}</td>${corpTd(d)}<td class="content">${esc(d.content)}</td>
      <td class="amt">${d.amount_str}</td>${ratioTd(d.ratio)}
      <td class="sub hide-m">${esc(d.party)}</td><td class="date hide-m">${esc(d.period)}</td>${dartTd(d)}`
  },
  earnings: {
    label:'실적',
    cols:[['공시일','pub_date'],['종목','corp_name'],['기간','period'],['매출','revenue_str','num'],['영업이익','op','num'],['순이익','ni_str','num'],['구분','fs_div','hide-m'],['','']],
    sorts:[['pub_date','최신순'],['op','영업이익순'],['yoy_op','영업이익 YoY순']],
    row:d=>`<td class="date">${d.pub_date}</td>${corpTd(d)}<td class="sub">${d.period}</td>
      <td class="num">${d.revenue_str}</td>
      <td class="num">${d.op_str}${yoyChip(d.yoy_op)}</td>
      <td class="num">${d.ni_str}</td><td class="sub hide-m">${d.fs_div}</td>${dartTd(d)}`
  },
  investments: {
    label:'신규시설투자',
    cols:[['공시일','pub_date'],['종목','corp_name'],['투자내용','content'],['투자금액','amount','num'],['매출대비','ratio','num'],['목적·위치','note','hide-m'],['완료예정','period','hide-m date'],['','']],
    sorts:[['pub_date','최신순'],['amount','금액순'],['ratio','매출대비순']],
    row:d=>`<td class="date">${d.pub_date}</td>${corpTd(d)}<td class="content">${esc(d.content)}</td>
      <td class="amt">${d.amount_str}</td>${ratioTd(d.ratio)}
      <td class="sub hide-m">${esc(d.note)}</td><td class="date hide-m">${esc(d.period)}</td>${dartTd(d)}`
  }
};

let DB={}, tab='contracts', sortKey='pub_date', dir=-1;
const tb=document.getElementById('tb'), th=document.getElementById('th'), q=document.getElementById('q'),
      sortSel=document.getElementById('sort'), daySel=document.getElementById('day');

function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function corpTd(d){ return `<td><span class="corp">${esc(d.corp_name)}</span>${d.stock_code?`<span class="code">${d.stock_code}</span>`:''}${d.corrected?`<span class="corr">정정</span>`:''}</td>`; }
function dartTd(d){ return `<td>${d.url?`<a class="dart" href="${d.url}" target="_blank" rel="noreferrer">DART</a>`:''}</td>`; }
function ratioTd(r){ const c=r==null?'sub':r>=100?'up':r>=30?'':'sub'; return `<td class="num ${c}">${r!=null?r+'%':'-'}</td>`; }
function yoyChip(v){ if(v==null) return ''; const c=v>=0?'up':'dn'; const s=v>=0?'+':''; return ` <span class="${c}" style="font-size:12px">${s}${v}%</span>`; }

function buildControls(){
  th.innerHTML='<tr>'+CFG[tab].cols.map(c=>`<th data-k="${c[1]||''}" class="${c[2]||''}">${c[0]}</th>`).join('')+'</tr>';
  th.querySelectorAll('th[data-k]').forEach(el=>{ if(!el.dataset.k) return; el.onclick=()=>{
    const k=el.dataset.k; if(sortKey===k) dir=-dir; else {sortKey=k; dir=(k==='corp_name')?1:-1;} sync(); render(); }; });
  sortSel.innerHTML=CFG[tab].sorts.map(s=>`<option value="${s[0]}">${s[1]}</option>`).join('');
  const days=[...new Set((DB[tab]||[]).map(d=>d.pub_date))].sort().reverse();
  daySel.innerHTML=days.map(d=>`<option value="${d}">${d} (${DB[tab].filter(x=>x.pub_date===d).length})</option>`).join('');
  sortKey='pub_date'; dir=-1; sync();
}
function sync(){ if(CFG[tab].sorts.some(s=>s[0]===sortKey)) sortSel.value=sortKey; }

function render(){
  const arr=DB[tab]||[], term=q.value.trim().toLowerCase();
  let rows = term
    ? arr.filter(d=>((d.corp_name||'')+(d.content||'')+(d.party||'')+(d.note||'')).toLowerCase().includes(term))
    : arr.filter(d=>d.pub_date===daySel.value);
  rows.sort((a,b)=>{ let av=a[sortKey],bv=b[sortKey];
    if(sortKey==='corp_name') return dir*((av||'')<(bv||'')?-1:(av||'')>(bv||'')?1:0);
    av=av==null?-Infinity:av; bv=bv==null?-Infinity:bv; return dir*(av-bv); });
  const span=CFG[tab].cols.length;
  tb.innerHTML = rows.length ? rows.map(d=>`<tr>${CFG[tab].row(d)}</tr>`).join('')
    : `<tr><td class="empty" colspan="${span}">해당 없음</td></tr>`;
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  tab=b.dataset.t; q.value=''; buildControls(); render();
});
sortSel.onchange=()=>{ sortKey=sortSel.value; dir=-1; render(); };
daySel.onchange=render; q.oninput=render;

fetch('data/board.json?_='+Date.now()).then(r=>r.json()).then(j=>{
  DB={contracts:j.contracts, earnings:j.earnings, investments:j.investments};
  document.getElementById('meta').textContent=`최근 ${j.days}일 · 수주 ${j.contracts.length}·실적 ${j.earnings.length}·시설투자 ${j.investments.length} · ${j.updated_at} 기준`;
  buildControls(); render();
}).catch(e=>{ tb.innerHTML='<tr><td class="empty" colspan="8">데이터 로드 실패</td></tr>'; });
</script>
</body>
</html>
